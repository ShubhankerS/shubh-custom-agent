name: CI-Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. SECURITY: Check for secrets and insecure code
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Python Security Scan (Bandit)
        run: |
          pip install bandit
          # Scans the 'app' folder for common security issues
          bandit -r app/ -ll

  # 2. QUALITY: Check for syntax errors (The "Does it actually run?" check)
  quality-gate:
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Python Syntax Check
        run: |
          # This only fails if your code is broken/invalid Python
          python -m compileall app/

  # 3. BUILD: Final Docker verification
  docker-build-test:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Verify Blueprint (Docker Build)
        run: |
          # This confirms the NAS will be able to build your image
          docker build -t nas-agent-test .