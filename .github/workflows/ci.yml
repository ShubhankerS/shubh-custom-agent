name: CI-Check

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # 1. SECURITY: Check for secrets and insecure code
  security-audit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret Scanning (Gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Python Security Scan (Bandit)
        run: |
          pip install bandit
          bandit -r app/ -ll

  # 2. LINT: Check for clean, professional code style
  lint:
    needs: security-audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Run Ruff (Linter)
        run: |
          pip install ruff
          # This checks for unused imports, messy code, and PEP8 issues
          ruff check app/

  # 3. QUALITY: Check for syntax errors
  quality-gate:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - name: Python Syntax Check
        run: python -m compileall app/

  # 4. BUILD: Final Docker verification
  docker-build-test:
    needs: quality-gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Verify Blueprint (Docker Build)
        run: docker build -t nas-agent-test .