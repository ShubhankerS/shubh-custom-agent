<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TrueNAS | Expert Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { background-color: #0d1117; overflow: hidden; }
        .markdown-body table { width: 100%; border-collapse: collapse; margin-bottom: 1rem; border: 1px solid #30363d; }
        .markdown-body th, .markdown-body td { border: 1px solid #30363d; padding: 8px; text-align: left; }
        .markdown-body th { background-color: #161b22; }
        .markdown-body pre { background-color: #161b22; padding: 12px; border-radius: 6px; border: 1px solid #30363d; }
        .advisory-block { background-color: #0d2a4a; border-left: 4px solid #3b82f6; padding: 1.5rem; margin: 1rem 0; border-radius: 4px; }
        #console { scroll-behavior: smooth; }
        .status-dot { height: 8px; width: 8px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body class="text-gray-300 font-mono flex h-screen">
    <!-- Real-time Telemetry Sidebar -->
    <aside class="w-64 border-r border-gray-800 p-6 flex flex-col gap-6 bg-[#090c10]">
        <div class="text-xs font-bold text-gray-500 uppercase tracking-widest">Live Telemetry</div>
        <div id="telemetry-box" class="space-y-4">
            <div class="p-3 bg-[#161b22] rounded border border-gray-800">
                <div class="text-[10px] text-gray-500 uppercase">Pool Health</div>
                <div id="pool-status" class="text-sm font-bold flex items-center gap-2">
                    <span id="pool-dot" class="status-dot bg-gray-500"></span>
                    <span id="pool-text">POLLING...</span>
                </div>
            </div>
            <div class="p-3 bg-[#161b22] rounded border border-gray-800">
                <div class="text-[10px] text-gray-500 uppercase">Memory Allocation</div>
                <div id="mem-text" class="text-sm font-bold">-- GB</div>
            </div>
        </div>
    </aside>

    <!-- Main Chat Console -->
    <main class="flex-1 flex flex-col relative">
        <header class="p-4 border-b border-gray-800 flex justify-between items-center bg-[#0d1117]">
            <h1 class="text-lg font-bold tracking-tighter text-white">TRUENAS_EXPERT_SYSTEM <span class="text-blue-500">v2.0</span></h1>
        </header>

        <div id="console" class="flex-1 overflow-y-auto p-6 space-y-6 pb-24">
            <div class="text-gray-600 italic">EXPERT ADVISOR ONLINE. READY FOR ARCHITECTURAL QUERIES.</div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-[#0d1117] border-t border-gray-800 p-4">
            <div class="max-w-4xl mx-auto flex gap-4 bg-[#161b22] rounded-lg p-2 border border-gray-800">
                <span class="text-blue-500 py-2 pl-2 font-bold">$</span>
                <input type="text" id="cmd" placeholder="Ask about storage strategy, App optimization..." 
                       class="flex-1 bg-transparent border-none outline-none text-white placeholder-gray-700 p-2" autofocus>
            </div>
        </div>
    </main>

    <script>
        const consoleEl = document.getElementById('console');
        const inputEl = document.getElementById('cmd');

        // Polling logic for Telemetry
        async function updateTelemetry() {
            try {
                const res = await fetch('/telemetry');
                const data = await res.json();
                const dot = document.getElementById('pool-dot');
                const text = document.getElementById('pool-text');
                
                text.innerText = data.pool_health.toUpperCase();
                dot.className = `status-dot ${data.status_code === 'healthy' ? 'bg-green-500' : data.status_code === 'warning' ? 'bg-yellow-500' : 'bg-red-500'}`;
                document.getElementById('mem-text').innerText = `${(data.memory_usage / 1024 / 1024 / 1024).toFixed(2)} GB`;
            } catch (e) {}
        }
        setInterval(updateTelemetry, 10000);
        updateTelemetry();

        // Optimized Scrolling
        function scrollToBottom() {
            consoleEl.scrollTop = consoleEl.scrollHeight;
        }

        async function runCommand() {
            const val = inputEl.value;
            if(!val) return;
            inputEl.value = '';

            consoleEl.innerHTML += `<div class="text-blue-400 font-bold mt-8">$ ${val}</div>`;
            const loading = document.createElement('div');
            loading.className = 'text-gray-500 animate-pulse';
            loading.innerText = 'ADVISOR ANALYZING...';
            consoleEl.appendChild(loading);
            scrollToBottom();

            try {
                const res = await fetch('/ask', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: val })
                });
                const data = await res.json();
                loading.remove();
                
                const out = document.createElement('div');
                out.className = 'markdown-body text-sm leading-relaxed text-gray-200 mt-2 pl-4 border-l border-gray-800';
                
                let htmlContent = marked.parse(data.answer);
                if (data.answer.includes('### ADVISORY')) {
                    htmlContent = htmlContent.replace(/<h3[^>]*>ADVISORY<\/h3>([\s\S]*)/i, (match, content) => {
                        return `<div class="advisory-block">${content}</div>`;
                    });
                }
                
                out.innerHTML = htmlContent;
                consoleEl.appendChild(out);
                scrollToBottom();
            } catch (e) {
                loading.innerText = 'COMMUNICATION_ERROR';
            }
        }

        inputEl.addEventListener('keypress', (e) => { if(e.key === 'Enter') runCommand(); });
    </script>
</body>
</html>
