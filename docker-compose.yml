services:
  nas-intelligence-agent:
    build: .
    container_name: nas-agent
    restart: always
    # network_mode: host allows 127.0.0.1 to point to the ACTUAL NAS
    network_mode: host 
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./docs:/app/docs
      - ./logs:/app/logs
      - /var/run/middlewared.sock:/var/run/middlewared.sock
